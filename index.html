<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🧠 TestoMania</title>
  <meta name="description" content="Pregătire EN și BAC cu AI - Clasa 8 și 12"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Nunito','Segoe UI',sans-serif;background:linear-gradient(135deg,#f0f4ff 0%,#faf5ff 50%,#f0fdf4 100%);min-height:100vh;}
    ::-webkit-scrollbar{width:6px;}
    ::-webkit-scrollbar-thumb{background:#c7d2fe;border-radius:99px;}
    @keyframes loading-bar{0%{width:0%}50%{width:100%}100%{width:0%}}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const SUBJECTS_8 = ["Matematică","Română","Istorie","Geografie","Fizică","Chimie","Biologie","Informatică"];
const SUBJECTS_12 = ["Matematică M1","Matematică M2","Română","Fizică","Chimie","Biologie","Geografie","Informatică","Filosofie","Economie","Logică","Psihologie","Sociologie","Istorie"];
const PROFILES_12 = ["Matematică-Informatică","Științe ale Naturii","Filologie","Științe Sociale","Pedagogic","Tehnologic"];

const SAMPLE_TESTS_8 = {
  "Matematică":[
    {title:"Model Evaluare Națională 2024",type:"model",year:2024},
    {title:"Model Evaluare Națională 2023",type:"model",year:2023},
    {title:"Subiect EN Sesiunea Iunie 2024",type:"sesiune",year:2024},
    {title:"Subiect EN Sesiunea Septembrie 2024",type:"sesiune_toamna",year:2024},
    {title:"Test Antrenament Nr. 1",type:"antrenament",year:2024},
    {title:"Test Antrenament Nr. 2",type:"antrenament",year:2024},
  ],
  "Română":[
    {title:"Model Evaluare Națională 2024",type:"model",year:2024},
    {title:"Subiect EN Sesiunea Iunie 2024",type:"sesiune",year:2024},
    {title:"Test Antrenament Nr. 1",type:"antrenament",year:2024},
  ]
};

const SAMPLE_TESTS_12 = {
  "Matematică M1":[
    {title:"Model Bacalaureat 2024",type:"model",year:2024},
    {title:"Subiect BAC Sesiunea Iunie 2024",type:"sesiune",year:2024},
    {title:"Subiect BAC Sesiunea Toamnă 2024",type:"sesiune_toamna",year:2024},
    {title:"Test Antrenament Nr. 1",type:"antrenament",year:2024},
  ],
  "Română":[
    {title:"Model Bacalaureat 2024",type:"model",year:2024},
    {title:"Subiect BAC Sesiunea Iunie 2024",type:"sesiune",year:2024},
  ]
};

const QUIZ_QUESTIONS = {
  "Matematică":[
    {q:"Calculează: 2³ + 3² = ?",answers:["15","17","13","19"],correct:1,explanation:"2³ = 8, 3² = 9, deci 8 + 9 = 17"},
    {q:"Dacă x + 5 = 12, atunci x = ?",answers:["5","6","7","8"],correct:2,explanation:"x = 12 - 5 = 7"},
    {q:"Cât este √144?",answers:["11","12","13","14"],correct:1,explanation:"12 × 12 = 144, deci √144 = 12"},
    {q:"Suma unghiurilor unui triunghi este:",answers:["90°","180°","270°","360°"],correct:1,explanation:"Suma unghiurilor oricărui triunghi este întotdeauna 180°"},
    {q:"Care este formula ariei cercului?",answers:["A = 2πr","A = πr²","A = πd","A = 2πr²"],correct:1,explanation:"Aria cercului = π × r², unde r este raza"},
  ],
  "Română":[
    {q:"Care este subiectul: 'Elevii învață cu sârguință'?",answers:["învață","elevii","cu sârguință","sârguință"],correct:1,explanation:"'Elevii' este subiectul - cine face acțiunea"},
    {q:"Ce figură de stil: 'luna zâmbea printre nori'?",answers:["Metaforă","Personificare","Comparație","Hiperbolă"],correct:1,explanation:"Personificarea atribuie însușiri omenești unui obiect neînsuflețit"},
    {q:"Cuvântul 'fereastră' are câte silabe?",answers:["2","3","4","5"],correct:1,explanation:"fe-reas-tră = 3 silabe"},
  ]
};

const typeLabels = {
  model:{label:"Model Oficial",color:"#7c3aed",bg:"#ede9fe"},
  sesiune:{label:"Sesiunea Vară",color:"#0369a1",bg:"#e0f2fe"},
  sesiune_toamna:{label:"Sesiunea Toamnă",color:"#b45309",bg:"#fef3c7"},
  antrenament:{label:"Test Antrenament",color:"#15803d",bg:"#dcfce7"},
};

function Badge({type}){
  const t=typeLabels[type]||{label:type,color:"#64748b",bg:"#f1f5f9"};
  return <span style={{background:t.bg,color:t.color,border:`1px solid ${t.color}33`,borderRadius:20,padding:"3px 12px",fontSize:11,fontWeight:700,letterSpacing:0.5,textTransform:"uppercase"}}>{t.label}</span>;
}

function TestCard({test,onClick}){
  const icons={model:"⭐",sesiune:"☀️",sesiune_toamna:"🍂",antrenament:"🏋️"};
  return(
    <div onClick={onClick} style={{background:"#fff",borderRadius:16,padding:"18px 20px",boxShadow:"0 2px 12px #6366f122",border:"1.5px solid #e0e7ff",cursor:"pointer",transition:"all 0.2s",display:"flex",alignItems:"center",gap:14}}
      onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-3px)";e.currentTarget.style.boxShadow="0 8px 28px #6366f133";}}
      onMouseLeave={e=>{e.currentTarget.style.transform="";e.currentTarget.style.boxShadow="0 2px 12px #6366f122";}}>
      <span style={{fontSize:28}}>{icons[test.type]||"📄"}</span>
      <div style={{flex:1}}>
        <div style={{fontWeight:700,color:"#1e1b4b",fontSize:15,marginBottom:6}}>{test.title}</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
          <Badge type={test.type}/>
          <span style={{color:"#94a3b8",fontSize:12}}>Anul {test.year}</span>
        </div>
      </div>
      <span style={{color:"#6366f1",fontSize:20}}>→</span>
    </div>
  );
}

function GeneratorModal({grade,onClose}){
  const [step,setStep]=useState(1);
  const [subject,setSubject]=useState("");
  const [profile,setProfile]=useState("");
  const [difficulty,setDifficulty]=useState("mediu");
  const [questions,setQuestions]=useState([]);
  const [current,setCurrent]=useState(0);
  const [selected,setSelected]=useState(null);
  const [answered,setAnswered]=useState(false);
  const [score,setScore]=useState(0);
  const [finished,setFinished]=useState(false);
  const [loading,setLoading]=useState(false);
  const [aiExplanation,setAiExplanation]=useState("");
  const subjects=grade===8?SUBJECTS_8:SUBJECTS_12;
  const gradeColor=grade===8?"#0ea5e9":"#8b5cf6";

  async function generateTest(){
    setLoading(true);setStep(3);
    const baseQ=QUIZ_QUESTIONS[subject]||QUIZ_QUESTIONS["Matematică"];
    try{
      const prompt=`Generează 5 întrebări grilă pentru ${subject} ${grade===8?"Evaluare Națională clasa a 8-a":`Bacalaureat ${profile}`}, nivel ${difficulty}.\nRăspunde STRICT în JSON, fără text suplimentar:\n[{"q":"întrebare","answers":["a","b","c","d"],"correct":0,"explanation":"explicatie"}]\nIndexul correct este 0-3. Program română.`;
      const response=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":window.ANTHROPIC_KEY||"","anthropic-version":"2023-06-01"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})
      });
      const data=await response.json();
      const text=data.content?.map(i=>i.text||"").join("")||"";
      const clean=text.replace(/```json|```/g,"").trim();
      setQuestions(JSON.parse(clean));
    }catch{setQuestions(baseQ);}
    setLoading(false);
  }

  async function getExpl(q){
    try{
      const response=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":window.ANTHROPIC_KEY||"","anthropic-version":"2023-06-01"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:200,messages:[{role:"user",content:`Explică pe scurt în română pentru elev clasa ${grade}: ${q.q}. Răspuns corect: ${q.answers[q.correct]}. ${q.explanation||""}`}]})
      });
      const data=await response.json();
      return data.content?.map(i=>i.text||"").join("")||q.explanation||"";
    }catch{return q.explanation||"Consultă manualul.";}
  }

  async function handleAnswer(idx){
    if(answered)return;
    setSelected(idx);setAnswered(true);
    if(idx===questions[current].correct)setScore(s=>s+1);
    const expl=await getExpl(questions[current]);
    setAiExplanation(expl);
  }

  function next(){
    if(current+1>=questions.length){setFinished(true);return;}
    setCurrent(c=>c+1);setSelected(null);setAnswered(false);setAiExplanation("");
  }

  return(
    <div style={{position:"fixed",inset:0,background:"#0008",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}
      onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{background:"#fff",borderRadius:24,width:"100%",maxWidth:560,maxHeight:"90vh",overflowY:"auto",boxShadow:"0 24px 60px #0004"}}>
        <div style={{background:`linear-gradient(135deg,${gradeColor},${grade===8?"#38bdf8":"#a78bfa"})`,padding:"24px 28px",borderRadius:"24px 24px 0 0",color:"#fff",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:22,fontWeight:900}}>🎲 Generator Teste</div>
            <div style={{opacity:0.85,fontSize:14}}>Clasa a {grade}-a • Powered by AI</div>
          </div>
          <button onClick={onClose} style={{background:"#fff3",border:"none",color:"#fff",fontSize:22,cursor:"pointer",borderRadius:"50%",width:36,height:36}}>✕</button>
        </div>
        <div style={{padding:28}}>
          {step===1&&(
            <div>
              <h3 style={{color:"#1e1b4b",marginBottom:16,fontSize:18}}>Alege materia:</h3>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                {subjects.map(s=>(
                  <button key={s} onClick={()=>{setSubject(s);setStep(grade===12?1.5:2);}}
                    style={{padding:"12px 16px",borderRadius:12,border:"2px solid #e0e7ff",background:subject===s?gradeColor:"#f8fafc",color:subject===s?"#fff":"#374151",cursor:"pointer",fontWeight:600,fontSize:13}}>
                    {s}
                  </button>
                ))}
              </div>
            </div>
          )}
          {step===1.5&&(
            <div>
              <button onClick={()=>setStep(1)} style={{background:"none",border:"none",color:gradeColor,cursor:"pointer",fontWeight:700,marginBottom:12}}>← Înapoi</button>
              <h3 style={{color:"#1e1b4b",marginBottom:16}}>Alege profilul:</h3>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                {PROFILES_12.map(p=>(
                  <button key={p} onClick={()=>{setProfile(p);setStep(2);}}
                    style={{padding:"12px 16px",borderRadius:12,border:"2px solid #e0e7ff",background:profile===p?gradeColor:"#f8fafc",color:profile===p?"#fff":"#374151",cursor:"pointer",fontWeight:600,fontSize:13}}>
                    {p}
                  </button>
                ))}
              </div>
            </div>
          )}
          {step===2&&(
            <div>
              <button onClick={()=>setStep(grade===12?1.5:1)} style={{background:"none",border:"none",color:gradeColor,cursor:"pointer",fontWeight:700,marginBottom:12}}>← Înapoi</button>
              <h3 style={{color:"#1e1b4b",marginBottom:8}}>Materie: <span style={{color:gradeColor}}>{subject}</span></h3>
              {profile&&<p style={{color:"#64748b",fontSize:14,marginBottom:16}}>Profil: {profile}</p>}
              <h3 style={{color:"#1e1b4b",marginBottom:16}}>Dificultate:</h3>
              <div style={{display:"flex",gap:12,marginBottom:24}}>
                {["ușor","mediu","greu"].map(d=>(
                  <button key={d} onClick={()=>setDifficulty(d)}
                    style={{flex:1,padding:14,borderRadius:12,border:"2px solid",borderColor:difficulty===d?gradeColor:"#e0e7ff",background:difficulty===d?gradeColor:"#f8fafc",color:difficulty===d?"#fff":"#374151",cursor:"pointer",fontWeight:700,fontSize:14}}>
                    {d==="ușor"?"😊 Ușor":d==="mediu"?"🤔 Mediu":"🔥 Greu"}
                  </button>
                ))}
              </div>
              <button onClick={generateTest} style={{width:"100%",padding:16,borderRadius:14,background:`linear-gradient(135deg,${gradeColor},${grade===8?"#38bdf8":"#a78bfa"})`,color:"#fff",border:"none",fontWeight:900,fontSize:17,cursor:"pointer"}}>
                🚀 Generează Testul!
              </button>
            </div>
          )}
          {step===3&&(
            <div>
              {loading?(
                <div style={{textAlign:"center",padding:"40px 0"}}>
                  <div style={{fontSize:48,marginBottom:16}}>🤖</div>
                  <div style={{fontSize:18,fontWeight:700,color:"#1e1b4b",marginBottom:8}}>AI generează testul tău...</div>
                  <div style={{color:"#94a3b8",marginBottom:20}}>Câteva secunde...</div>
                  <div style={{margin:"0 auto",width:120,height:6,background:"#e0e7ff",borderRadius:99,overflow:"hidden"}}>
                    <div style={{height:"100%",background:gradeColor,borderRadius:99,animation:"loading-bar 1.5s ease-in-out infinite"}}/>
                  </div>
                </div>
              ):finished?(
                <div style={{textAlign:"center",padding:"20px 0"}}>
                  <div style={{fontSize:64,marginBottom:12}}>{score>=questions.length*0.8?"🏆":score>=questions.length*0.5?"👍":"📚"}</div>
                  <div style={{fontSize:28,fontWeight:900,color:"#1e1b4b",marginBottom:8}}>{score} / {questions.length} corecte</div>
                  <div style={{fontSize:16,color:"#64748b",marginBottom:24,padding:"12px 20px",background:"#f8fafc",borderRadius:12}}>
                    {score===questions.length?"Perfect! Ești pregătit! 🌟":score>=questions.length*0.7?"Foarte bine! 💪":"Continuă să înveți! 📖"}
                  </div>
                  <div style={{display:"flex",gap:12}}>
                    <button onClick={()=>{setStep(1);setSubject("");setProfile("");setScore(0);setFinished(false);setCurrent(0);setAnswered(false);setSelected(null);}}
                      style={{flex:1,padding:14,borderRadius:12,background:"#f8fafc",border:"2px solid #e0e7ff",fontWeight:700,cursor:"pointer"}}>🔄 Test Nou</button>
                    <button onClick={()=>{setScore(0);setFinished(false);setCurrent(0);setAnswered(false);setSelected(null);generateTest();}}
                      style={{flex:1,padding:14,borderRadius:12,background:gradeColor,color:"#fff",border:"none",fontWeight:700,cursor:"pointer"}}>🎲 Repetă</button>
                  </div>
                </div>
              ):questions.length>0?(
                <div>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}>
                    <span style={{color:"#94a3b8",fontSize:14}}>Întrebarea {current+1} din {questions.length}</span>
                    <span style={{fontWeight:700,color:gradeColor}}>✅ {score} corecte</span>
                  </div>
                  <div style={{height:6,background:"#e0e7ff",borderRadius:99,marginBottom:24,overflow:"hidden"}}>
                    <div style={{height:"100%",background:`linear-gradient(90deg,${gradeColor},${grade===8?"#38bdf8":"#a78bfa"})`,width:`${(current/questions.length)*100}%`,borderRadius:99,transition:"width 0.4s"}}/>
                  </div>
                  <div style={{background:"#f8fafc",borderRadius:16,padding:"20px 22px",marginBottom:20,borderLeft:`4px solid ${gradeColor}`,fontSize:17,fontWeight:700,color:"#1e1b4b",lineHeight:1.5}}>
                    {questions[current].q}
                  </div>
                  <div style={{display:"grid",gap:10,marginBottom:20}}>
                    {questions[current].answers.map((ans,i)=>{
                      let bg="#f8fafc",border="2px solid #e0e7ff",color="#374151";
                      if(answered){
                        if(i===questions[current].correct){bg="#dcfce7";border="2px solid #22c55e";color="#15803d";}
                        else if(i===selected){bg="#fee2e2";border="2px solid #ef4444";color="#b91c1c";}
                      }
                      return(
                        <button key={i} onClick={()=>handleAnswer(i)}
                          style={{padding:"14px 18px",borderRadius:12,border,background:bg,color,cursor:answered?"default":"pointer",fontWeight:600,fontSize:15,textAlign:"left",transition:"all 0.15s"}}>
                          <span style={{opacity:0.5,marginRight:10}}>{["A","B","C","D"][i]}.</span>{ans}
                        </button>
                      );
                    })}
                  </div>
                  {answered&&(
                    <div style={{background:selected===questions[current].correct?"#f0fdf4":"#fff7ed",border:`1.5px solid ${selected===questions[current].correct?"#86efac":"#fbbf24"}`,borderRadius:14,padding:"14px 18px",marginBottom:20,fontSize:14,color:"#374151",lineHeight:1.6}}>
                      <div style={{fontWeight:800,marginBottom:6,color:selected===questions[current].correct?"#15803d":"#b45309"}}>
                        {selected===questions[current].correct?"✅ Corect!":"❌ Răspuns greșit"}
                      </div>
                      <div>{aiExplanation||"Se încarcă explicația..."}</div>
                    </div>
                  )}
                  {answered&&(
                    <button onClick={next} style={{width:"100%",padding:15,borderRadius:13,background:`linear-gradient(135deg,${gradeColor},${grade===8?"#38bdf8":"#a78bfa"})`,color:"#fff",border:"none",fontWeight:800,fontSize:16,cursor:"pointer"}}>
                      {current+1>=questions.length?"🏁 Vezi Rezultatul":"Următoarea →"}
                    </button>
                  )}
                </div>
              ):null}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function SubjectPage({grade,onBack}){
  const [sel,setSel]=useState(null);
  const subjects=grade===8?SUBJECTS_8:SUBJECTS_12;
  const tests=grade===8?SAMPLE_TESTS_8:SAMPLE_TESTS_12;
  const color=grade===8?"#0ea5e9":"#8b5cf6";
  const emoji=grade===8?"📗":"📘";
  const icons=["📐","📝","🗺️","🌍","⚡","🧪","🌿","💻","🎭","💰","🧠","❤️","🤝","📜"];

  if(sel){
    const subTests=tests[sel]||[];
    return(
      <div>
        <button onClick={()=>setSel(null)} style={{background:"none",border:"none",color,cursor:"pointer",fontWeight:700,fontSize:16,marginBottom:20}}>← Înapoi la materii</button>
        <h2 style={{fontSize:24,fontWeight:900,color:"#1e1b4b",marginBottom:6}}>{sel}</h2>
        <p style={{color:"#64748b",marginBottom:24}}>Clasa a {grade}-a • {subTests.length} teste disponibile</p>
        {subTests.length>0?(
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {subTests.map((t,i)=><TestCard key={i} test={t} onClick={()=>alert(`Se deschide: ${t.title}\n\nAdaugă URL-ul PDF-ului în cod!`)}/>)}
          </div>
        ):(
          <div style={{textAlign:"center",padding:"48px 20px",background:"#f8fafc",borderRadius:20,border:"2px dashed #e0e7ff"}}>
            <div style={{fontSize:48,marginBottom:12}}>📭</div>
            <div style={{fontWeight:700,color:"#64748b"}}>Nicio fișă adăugată încă</div>
          </div>
        )}
      </div>
    );
  }

  return(
    <div>
      <button onClick={onBack} style={{background:"none",border:"none",color,cursor:"pointer",fontWeight:700,fontSize:16,marginBottom:20}}>← Acasă</button>
      <div style={{background:`linear-gradient(135deg,${color},${grade===8?"#38bdf8":"#a78bfa"})`,borderRadius:20,padding:"28px 24px",color:"#fff",marginBottom:28}}>
        <div style={{fontSize:40,marginBottom:8}}>{emoji}</div>
        <h2 style={{fontSize:26,fontWeight:900,margin:"0 0 6px"}}>{grade===8?"Evaluare Națională":"Bacalaureat"}</h2>
        <p style={{opacity:0.85,margin:0}}>Clasa a {grade}-a • {subjects.length} materii</p>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        {subjects.map((s,i)=>(
          <button key={s} onClick={()=>setSel(s)}
            style={{padding:"18px 14px",borderRadius:16,border:"2px solid #e0e7ff",background:"#fff",cursor:"pointer",fontWeight:700,color:"#1e1b4b",fontSize:13,transition:"all 0.15s",boxShadow:"0 2px 8px #6366f111"}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor=color;e.currentTarget.style.transform="scale(1.03)";}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor="#e0e7ff";e.currentTarget.style.transform="";}}>
            <div style={{fontSize:22,marginBottom:6}}>{icons[i%14]}</div>
            {s}
            {tests[s]&&<div style={{fontSize:11,color:"#94a3b8",fontWeight:500,marginTop:4}}>{tests[s].length} teste</div>}
          </button>
        ))}
      </div>
    </div>
  );
}

function VideosPage({onBack}){
  const [videos,setVideos]=useState([
    {id:1,title:"Funcții liniare - Matematică cls. 8",subject:"Matematică",grade:8,url:"",thumbnail:"📹"},
    {id:2,title:"Teorema lui Pitagora explicată",subject:"Matematică",grade:8,url:"",thumbnail:"📐"},
  ]);
  const [showAdd,setShowAdd]=useState(false);
  const [nv,setNv]=useState({title:"",subject:"",grade:8,url:""});

  function addVideo(){
    if(!nv.title||!nv.url)return;
    setVideos(v=>[...v,{...nv,id:Date.now(),thumbnail:"🎥"}]);
    setNv({title:"",subject:"",grade:8,url:""});setShowAdd(false);
  }

  return(
    <div>
      <button onClick={onBack} style={{background:"none",border:"none",color:"#f59e0b",cursor:"pointer",fontWeight:700,fontSize:16,marginBottom:20}}>← Acasă</button>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
        <h2 style={{fontSize:24,fontWeight:900,color:"#1e1b4b",margin:0}}>🎬 Videolecții</h2>
        <button onClick={()=>setShowAdd(true)} style={{background:"#f59e0b",color:"#fff",border:"none",borderRadius:12,padding:"10px 18px",fontWeight:700,cursor:"pointer",fontSize:14}}>+ Adaugă</button>
      </div>
      {showAdd&&(
        <div style={{background:"#fffbeb",border:"2px solid #fbbf24",borderRadius:16,padding:20,marginBottom:20}}>
          <h4 style={{margin:"0 0 16px",color:"#92400e"}}>Adaugă Videolecție</h4>
          <input placeholder="Titlu lecție..." value={nv.title} onChange={e=>setNv(v=>({...v,title:e.target.value}))}
            style={{width:"100%",padding:"10px 14px",borderRadius:10,border:"1.5px solid #fbbf24",marginBottom:10,fontSize:14,fontFamily:"inherit"}}/>
          <input placeholder="URL YouTube..." value={nv.url} onChange={e=>setNv(v=>({...v,url:e.target.value}))}
            style={{width:"100%",padding:"10px 14px",borderRadius:10,border:"1.5px solid #fbbf24",marginBottom:10,fontSize:14,fontFamily:"inherit"}}/>
          <div style={{display:"flex",gap:10,marginBottom:12}}>
            <select value={nv.subject} onChange={e=>setNv(v=>({...v,subject:e.target.value}))}
              style={{flex:1,padding:"10px 14px",borderRadius:10,border:"1.5px solid #fbbf24",fontSize:14,fontFamily:"inherit"}}>
              <option value="">Materie...</option>
              {SUBJECTS_8.map(s=><option key={s}>{s}</option>)}
            </select>
            <select value={nv.grade} onChange={e=>setNv(v=>({...v,grade:+e.target.value}))}
              style={{padding:"10px 14px",borderRadius:10,border:"1.5px solid #fbbf24",fontSize:14,fontFamily:"inherit"}}>
              <option value={8}>Clasa 8</option><option value={12}>Clasa 12</option>
            </select>
          </div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={addVideo} style={{flex:1,padding:12,borderRadius:10,background:"#f59e0b",color:"#fff",border:"none",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>✅ Salvează</button>
            <button onClick={()=>setShowAdd(false)} style={{flex:1,padding:12,borderRadius:10,background:"#f8fafc",border:"2px solid #e0e7ff",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Anulează</button>
          </div>
        </div>
      )}
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {videos.map(v=>(
          <div key={v.id} style={{background:"#fff",borderRadius:16,padding:"16px 18px",boxShadow:"0 2px 12px #6366f111",border:"1.5px solid #e0e7ff",display:"flex",alignItems:"center",gap:14}}>
            <div style={{width:52,height:52,borderRadius:12,background:"#fef3c7",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,flexShrink:0}}>{v.thumbnail}</div>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,color:"#1e1b4b",fontSize:15}}>{v.title}</div>
              <div style={{color:"#94a3b8",fontSize:12,marginTop:4}}>{v.subject&&<span style={{marginRight:10}}>{v.subject}</span>}<span>Clasa a {v.grade}-a</span></div>
            </div>
            {v.url&&<a href={v.url} target="_blank" rel="noreferrer" style={{background:"#ef4444",color:"#fff",borderRadius:10,padding:"8px 14px",textDecoration:"none",fontSize:13,fontWeight:700}}>▶ Play</a>}
          </div>
        ))}
      </div>
    </div>
  );
}

function FisePage({onBack}){
  const [fise,setFise]=useState([
    {id:1,title:"Fișă Recapitulativă - Ecuații de gradul II",subject:"Matematică",grade:8,added:"Mai 2025"},
    {id:2,title:"Figuri de Stil - Limba Română",subject:"Română",grade:8,added:"Mai 2025"},
  ]);
  const [showAdd,setShowAdd]=useState(false);
  const [nf,setNf]=useState({title:"",subject:"",grade:8});

  function addFisa(){
    if(!nf.title)return;
    setFise(f=>[...f,{...nf,id:Date.now(),added:"Acum"}]);
    setNf({title:"",subject:"",grade:8});setShowAdd(false);
  }

  return(
    <div>
      <button onClick={onBack} style={{background:"none",border:"none",color:"#10b981",cursor:"pointer",fontWeight:700,fontSize:16,marginBottom:20}}>← Acasă</button>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
        <h2 style={{fontSize:24,fontWeight:900,color:"#1e1b4b",margin:0}}>📋 Fișele Mele</h2>
        <button onClick={()=>setShowAdd(true)} style={{background:"#10b981",color:"#fff",border:"none",borderRadius:12,padding:"10px 18px",fontWeight:700,cursor:"pointer",fontSize:14}}>+ Adaugă</button>
      </div>
      {showAdd&&(
        <div style={{background:"#f0fdf4",border:"2px solid #86efac",borderRadius:16,padding:20,marginBottom:20}}>
          <h4 style={{margin:"0 0 16px",color:"#14532d"}}>Adaugă Fișă Nouă</h4>
          <input placeholder="Titlu fișă..." value={nf.title} onChange={e=>setNf(f=>({...f,title:e.target.value}))}
            style={{width:"100%",padding:"10px 14px",borderRadius:10,border:"1.5px solid #86efac",marginBottom:10,fontSize:14,fontFamily:"inherit"}}/>
          <div style={{display:"flex",gap:10,marginBottom:12}}>
            <select value={nf.subject} onChange={e=>setNf(f=>({...f,subject:e.target.value}))}
              style={{flex:1,padding:"10px 14px",borderRadius:10,border:"1.5px solid #86efac",fontSize:14,fontFamily:"inherit"}}>
              <option value="">Materie...</option>{SUBJECTS_8.map(s=><option key={s}>{s}</option>)}
            </select>
            <select value={nf.grade} onChange={e=>setNf(f=>({...f,grade:+e.target.value}))}
              style={{padding:"10px 14px",borderRadius:10,border:"1.5px solid #86efac",fontSize:14,fontFamily:"inherit"}}>
              <option value={8}>Clasa 8</option><option value={12}>Clasa 12</option>
            </select>
          </div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={addFisa} style={{flex:1,padding:12,borderRadius:10,background:"#10b981",color:"#fff",border:"none",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>✅ Salvează</button>
            <button onClick={()=>setShowAdd(false)} style={{flex:1,padding:12,borderRadius:10,background:"#f8fafc",border:"2px solid #e0e7ff",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Anulează</button>
          </div>
        </div>
      )}
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {fise.map(f=>(
          <div key={f.id} style={{background:"#fff",borderRadius:16,padding:"16px 18px",boxShadow:"0 2px 12px #6366f111",border:"1.5px solid #e0e7ff",display:"flex",alignItems:"center",gap:14}}>
            <div style={{width:52,height:52,borderRadius:12,background:"#dcfce7",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,flexShrink:0}}>📄</div>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,color:"#1e1b4b",fontSize:15}}>{f.title}</div>
              <div style={{color:"#94a3b8",fontSize:12,marginTop:4}}>{f.subject&&<span style={{marginRight:10}}>{f.subject}</span>}<span>Clasa a {f.grade}-a</span><span style={{marginLeft:10}}>• {f.added}</span></div>
            </div>
            <button onClick={()=>setFise(fs=>fs.filter(x=>x.id!==f.id))} style={{background:"#fee2e2",border:"none",color:"#ef4444",borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:16}}>🗑</button>
          </div>
        ))}
        {fise.length===0&&<div style={{textAlign:"center",padding:"48px 20px",background:"#f8fafc",borderRadius:20,border:"2px dashed #e0e7ff"}}><div style={{fontSize:48,marginBottom:12}}>📭</div><div style={{fontWeight:700,color:"#64748b"}}>Nicio fișă adăugată</div></div>}
      </div>
    </div>
  );
}

function App(){
  const [page,setPage]=useState("home");
  const [showGen,setShowGen]=useState(false);
  const [genGrade,setGenGrade]=useState(8);
  const [menuOpen,setMenuOpen]=useState(false);

  function openGen(g){setGenGrade(g);setShowGen(true);}

  const NAV=[
    {id:"home",icon:"🏠",label:"Acasă"},
    {id:"cls8",icon:"📗",label:"Cls. 8"},
    {id:"cls12",icon:"📘",label:"Cls. 12"},
    {id:"generator",icon:"🎲",label:"Generator"},
    {id:"fise",icon:"📋",label:"Fișe"},
  ];

  return(
    <div style={{fontFamily:"'Nunito','Segoe UI',sans-serif",background:"linear-gradient(135deg,#f0f4ff 0%,#faf5ff 50%,#f0fdf4 100%)",minHeight:"100vh",maxWidth:480,margin:"0 auto"}}>
      {/* HEADER */}
      <div style={{background:"linear-gradient(135deg,#4f46e5,#7c3aed,#0ea5e9)",padding:"20px 22px 16px",position:"sticky",top:0,zIndex:100,boxShadow:"0 4px 20px #4f46e544"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div onClick={()=>setPage("home")} style={{cursor:"pointer"}}>
            <div style={{fontSize:24,fontWeight:900,color:"#fff",letterSpacing:-0.5,lineHeight:1.1}}>🧠 TestoMania</div>
            <div style={{fontSize:11,color:"#c7d2fe",fontWeight:600,letterSpacing:1}}>PREGĂTIRE • EN & BAC</div>
          </div>
          <button onClick={()=>setMenuOpen(m=>!m)} style={{background:"#ffffff22",border:"1.5px solid #ffffff44",color:"#fff",borderRadius:12,padding:"8px 12px",cursor:"pointer",fontSize:18,fontFamily:"inherit"}}>☰</button>
        </div>
        {menuOpen&&(
          <div style={{position:"absolute",top:"100%",right:16,background:"#fff",borderRadius:16,boxShadow:"0 12px 40px #0003",padding:8,minWidth:200,zIndex:200,border:"1.5px solid #e0e7ff"}}>
            {[...NAV,{id:"videos",icon:"🎬",label:"Videolecții"}].map(item=>(
              <button key={item.id} onClick={()=>{setPage(item.id);setMenuOpen(false);}}
                style={{display:"block",width:"100%",padding:"12px 16px",borderRadius:10,border:"none",background:page===item.id?"#ede9fe":"transparent",color:page===item.id?"#7c3aed":"#374151",fontWeight:700,fontSize:14,cursor:"pointer",textAlign:"left",fontFamily:"inherit"}}>
                {item.icon} {item.label}
              </button>
            ))}
          </div>
        )}
      </div>

      {/* CONTENT */}
      <div style={{padding:"24px 18px 100px"}}>
        {page==="home"&&(
          <div>
            <div style={{background:"linear-gradient(135deg,#4f46e5,#7c3aed)",borderRadius:24,padding:"28px 24px",color:"#fff",marginBottom:24,position:"relative",overflow:"hidden"}}>
              <div style={{position:"absolute",right:-20,top:-20,fontSize:100,opacity:0.15,transform:"rotate(15deg)"}}>🧠</div>
              <h1 style={{fontSize:28,fontWeight:900,margin:"0 0 8px",lineHeight:1.2}}>Bine ai venit la<br/>TestoMania! 🎉</h1>
              <p style={{opacity:0.85,margin:"0 0 20px",fontSize:15}}>Pregătire completă EN și BAC cu AI!</p>
              <div style={{display:"flex",gap:10}}>
                <button onClick={()=>openGen(8)} style={{flex:1,padding:"12px 0",borderRadius:12,background:"#fff",color:"#4f46e5",border:"none",fontWeight:800,fontSize:14,cursor:"pointer",fontFamily:"inherit"}}>🎲 Test EN</button>
                <button onClick={()=>openGen(12)} style={{flex:1,padding:"12px 0",borderRadius:12,background:"#ffffff22",color:"#fff",border:"2px solid #ffffff44",fontWeight:800,fontSize:14,cursor:"pointer",fontFamily:"inherit"}}>🎲 Test BAC</button>
              </div>
            </div>
            <h3 style={{fontWeight:800,color:"#1e1b4b",marginBottom:14,fontSize:17}}>Accesează rapid</h3>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:24}}>
              {[
                {id:"cls8",emoji:"📗",title:"Clasa a 8-a",sub:"Evaluare Națională",color:"#0ea5e9",bg:"#e0f2fe"},
                {id:"cls12",emoji:"📘",title:"Clasa a 12-a",sub:"Bacalaureat",color:"#8b5cf6",bg:"#ede9fe"},
                {id:"videos",emoji:"🎬",title:"Videolecții",sub:"Lecții video",color:"#f59e0b",bg:"#fef3c7"},
                {id:"fise",emoji:"📋",title:"Fișele Mele",sub:"Adaugă fișe",color:"#10b981",bg:"#dcfce7"},
              ].map(item=>(
                <button key={item.id} onClick={()=>setPage(item.id)}
                  style={{padding:"20px 14px",borderRadius:18,border:"2px solid transparent",background:item.bg,cursor:"pointer",textAlign:"center",transition:"all 0.2s",boxShadow:"0 2px 12px #00000011",fontFamily:"inherit"}}
                  onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-4px)";}}
                  onMouseLeave={e=>{e.currentTarget.style.transform="";}}>
                  <div style={{fontSize:32,marginBottom:8}}>{item.emoji}</div>
                  <div style={{fontWeight:800,color:item.color,fontSize:14}}>{item.title}</div>
                  <div style={{color:"#64748b",fontSize:12,marginTop:4}}>{item.sub}</div>
                </button>
              ))}
            </div>
            <div style={{background:"#fff",borderRadius:20,padding:"20px 22px",boxShadow:"0 2px 16px #6366f111",border:"1.5px solid #e0e7ff"}}>
              <h4 style={{margin:"0 0 16px",color:"#1e1b4b",fontWeight:800,fontSize:16}}>📊 Pe scurt</h4>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
                {[{n:"14",label:"Materii",color:"#4f46e5"},{n:"∞",label:"Teste AI",color:"#7c3aed"},{n:"6",label:"Profile BAC",color:"#0ea5e9"}].map(s=>(
                  <div key={s.label} style={{textAlign:"center"}}>
                    <div style={{fontSize:28,fontWeight:900,color:s.color}}>{s.n}</div>
                    <div style={{fontSize:12,color:"#94a3b8",fontWeight:600}}>{s.label}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}
        {page==="cls8"&&<SubjectPage grade={8} onBack={()=>setPage("home")}/>}
        {page==="cls12"&&<SubjectPage grade={12} onBack={()=>setPage("home")}/>}
        {page==="videos"&&<VideosPage onBack={()=>setPage("home")}/>}
        {page==="fise"&&<FisePage onBack={()=>setPage("home")}/>}
        {page==="generator"&&(
          <div>
            <h2 style={{fontSize:24,fontWeight:900,color:"#1e1b4b",marginBottom:20}}>🎲 Generator Teste</h2>
            <div style={{display:"flex",flexDirection:"column",gap:14}}>
              <div onClick={()=>openGen(8)} style={{background:"linear-gradient(135deg,#0ea5e9,#38bdf8)",borderRadius:20,padding:"24px 22px",color:"#fff",cursor:"pointer",boxShadow:"0 8px 24px #0ea5e933"}}>
                <div style={{fontSize:36,marginBottom:10}}>📗</div>
                <div style={{fontWeight:900,fontSize:20,marginBottom:6}}>Evaluare Națională</div>
                <div style={{opacity:0.85,fontSize:14}}>Clasa a 8-a • Toate materiile</div>
              </div>
              <div onClick={()=>openGen(12)} style={{background:"linear-gradient(135deg,#8b5cf6,#a78bfa)",borderRadius:20,padding:"24px 22px",color:"#fff",cursor:"pointer",boxShadow:"0 8px 24px #8b5cf633"}}>
                <div style={{fontSize:36,marginBottom:10}}>📘</div>
                <div style={{fontWeight:900,fontSize:20,marginBottom:6}}>Bacalaureat</div>
                <div style={{opacity:0.85,fontSize:14}}>Clasa a 12-a • Toate profilurile</div>
              </div>
            </div>
          </div>
        )}
      </div>

      {/* BOTTOM NAV */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"rgba(255,255,255,0.95)",backdropFilter:"blur(12px)",borderTop:"1.5px solid #e0e7ff",padding:"10px 8px 16px",display:"flex",justifyContent:"space-around"}}>
        {NAV.map(n=>(
          <button key={n.id} onClick={()=>setPage(n.id)}
            style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,border:"none",cursor:"pointer",color:page===n.id?"#4f46e5":"#94a3b8",padding:"4px 10px",borderRadius:12,background:page===n.id?"#ede9fe":"transparent",transition:"all 0.15s",fontFamily:"inherit"}}>
            <span style={{fontSize:22}}>{n.icon}</span>
            <span style={{fontSize:10,fontWeight:700}}>{n.label}</span>
          </button>
        ))}
      </div>

      {showGen&&<GeneratorModal grade={genGrade} onClose={()=>setShowGen(false)}/>}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
